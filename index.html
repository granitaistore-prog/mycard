<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAVCHUK1990 | Granit AI Store</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #60a5fa 0%, #a855f7 50%, #ec4899 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --text: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: var(--glass);
            width: 85%;
            max-width: 380px;
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px; /* Квадрат із закругленням краще підходить для такого лого */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid #fff;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            color: var(--text);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tg { background: #24A1DE; }
        .viber { background: #7360f2; }
        .email { background: #333333; }

        footer {
            margin-top: 30px;
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="logo.png" alt="Granit AI Logo" class="profile-img">
        </div>
        
        <h1>@KRAVCHUK1990</h1>
        <span class="subtitle">Granit AI Store</span>

        <div class="links">
            <a href="https://t.me/KRAVCHUK1990" class="btn tg">Telegram</a>
            <a href="viber://chat?number=%2B380958546754" class="btn viber">Viber</a>
            <a href="mailto:granit.ai.store@gmail.com" class="btn email">Надіслати Email</a>
        </div>

        <footer>
            Digital Business Card
        </footer>
    </div>

</body>
</html>
